<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 2.1 — The solve-verify asymmetry</title>
<style>
:root {
  --color-white: #FFFFFF;
  --color-fill: #F5EFE8;
  --color-ink: #2a1a0e;
  --color-mark: #6B3520;
  --color-red: #C8102E;
  --color-slate: #1A3A5C;
  --color-ochre: #C8860E;
  --color-secondary: #545454;
  --color-border: #D4D4D4;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-white: #111111;
    --color-fill: #1a1612;
    --color-ink: #F0EBE3;
    --color-mark: #C8865E;
    --color-red: #E8243A;
    --color-slate: #6B8FB8;
    --color-ochre: #D49A30;
    --color-secondary: #A0978C;
    --color-border: #2E2E2E;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--color-white); color: var(--color-ink); font-family: 'EB Garamond', Georgia, serif; padding: 24px; }
#chart { width: 100%; min-height: 520px; position: relative; }
.tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-slate); color: var(--color-white); padding: 6px 10px; font-size: 12px; font-family: 'EB Garamond', Georgia, serif; max-width: 260px; }
text { font-family: 'EB Garamond', Georgia, serif; fill: var(--color-ink); }
.caps { font-family: 'IBM Plex Mono', 'JetBrains Mono', monospace; letter-spacing: 0.08em; fill: var(--color-secondary); font-size: 10px; }
.secondary { fill: var(--color-secondary); }
.chart-bg { fill: var(--color-fill); stroke: var(--color-border); stroke-width: 1; }
.axis-line { stroke: var(--color-ink); stroke-width: 1; }
.series-line { stroke: var(--color-ink); stroke-width: 1.5; fill: none; cursor: pointer; transition: stroke-width 120ms; }
.series-line:hover { stroke-width: 2.5; }
.gap-line { stroke: var(--color-border); stroke-width: 0.75; stroke-dasharray: 4 3; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div id="chart" role="main"></div>
<div class="tooltip" id="tt"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
function draw() {
  d3.select('#chart').selectAll('*').remove();
  const totalWidth = document.getElementById('chart').clientWidth || 700;
  const totalHeight = 520;
  const margin = { top: 72, right: 140, bottom: 64, left: 72 };
  const chartWidth = totalWidth - margin.left - margin.right;
  const chartHeight = totalHeight - margin.top - margin.bottom;

  const svg = d3.select('#chart').append('svg')
    .attr('width', totalWidth).attr('height', totalHeight)
    .attr('role', 'img').attr('aria-labelledby', 'chart-title chart-desc');
  svg.append('title').attr('id', 'chart-title').text('The solve-verify asymmetry');
  svg.append('desc').attr('id', 'chart-desc').text("Claude's solve speed rises steeply while human verification capacity stays approximately flat over time.");

  svg.append('text').attr('class','caps').attr('x',margin.left).attr('y',32).text('FIGURE 2.1 — SOLVE/VERIFY');
  svg.append('text').attr('x',margin.left).attr('y',56).attr('font-weight','bold').attr('font-size',13).text('Solve speed rises. Verification capacity does not.');

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  g.append('rect').attr('class','chart-bg').attr('x',0).attr('y',0).attr('width',chartWidth).attr('height',chartHeight);

  const x = d3.scaleLinear().domain([0,1]).range([0,chartWidth]);
  const y = d3.scaleLinear().domain([0,1]).range([chartHeight,0]);

  // Axes
  g.append('line').attr('class','axis-line').attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',chartHeight);
  g.append('line').attr('class','axis-line').attr('x1',0).attr('y1',chartHeight).attr('x2',chartWidth).attr('y2',chartHeight);

  // X ticks (years)
  const years = [{t:0.05,label:'2022'},{t:0.25,label:'2023'},{t:0.5,label:'2024'},{t:0.75,label:'2025'},{t:0.97,label:'2026 →'}];
  years.forEach(yr=>{
    g.append('text').attr('x',x(yr.t)).attr('y',chartHeight+18).attr('text-anchor','middle').attr('font-size',10).attr('class','secondary').text(yr.label);
  });
  g.append('text').attr('x',chartWidth/2).attr('y',chartHeight+44).attr('text-anchor','middle').attr('font-size',11).attr('class','secondary').text('time →');
  g.append('text').attr('transform',`translate(-44,${chartHeight/2}) rotate(-90)`).attr('text-anchor','middle').attr('font-size',11).attr('class','secondary').text('capacity / speed (relative)');

  // Series points
  const solve = d3.range(0,1.01,0.05).map(t => ({t, v: 0.05 + Math.pow(t,2.1)*0.92}));
  const verify = d3.range(0,1.01,0.05).map(t => ({t, v: 0.18 + t*0.08}));

  const line = d3.line().x(d=>x(d.t)).y(d=>y(d.v)).curve(d3.curveCatmullRom.alpha(0.5));

  const tt = d3.select('#tt');
  function showTip(html){ tt.html(html).style('opacity',1); }
  function moveTip(e){ tt.style('left',(e.pageX+12)+'px').style('top',(e.pageY-8)+'px'); }
  function hideTip(){ tt.style('opacity',0); }

  // Gap dashed verticals at three sample points
  [0.4,0.65,0.9].forEach(t=>{
    g.append('line').attr('class','gap-line').attr('x1',x(t)).attr('x2',x(t)).attr('y1',y(solve.find(d=>Math.abs(d.t-t)<0.03)?.v ?? 0.5)).attr('y2',y(verify.find(d=>Math.abs(d.t-t)<0.03)?.v ?? 0.2));
  });
  g.append('text').attr('class','caps').attr('x',x(0.62)).attr('y',y(0.58)).text('THE WIDENING GAP');

  g.append('path').datum(solve).attr('class','series-line').attr('d', line)
    .on('mouseenter',()=>showTip("Claude's solve speed: rising fast across every model generation."))
    .on('mousemove',moveTip).on('mouseleave',hideTip);
  g.append('path').datum(verify).attr('class','series-line').attr('d', line)
    .on('mouseenter',()=>showTip('Human verification: bottlenecked on a cognitive process Claude is not subject to. Trainable, but slow.'))
    .on('mousemove',moveTip).on('mouseleave',hideTip);

  // End labels
  const solveEnd = solve[solve.length-1];
  const verifyEnd = verify[verify.length-1];
  g.append('text').attr('x',x(solveEnd.t)+8).attr('y',y(solveEnd.v)+4).attr('font-weight','bold').attr('font-size',11).text('Claude solves');
  g.append('text').attr('x',x(solveEnd.t)+8).attr('y',y(solveEnd.v)+18).attr('font-size',10).attr('class','secondary').text('rising fast');
  g.append('text').attr('x',x(verifyEnd.t)+8).attr('y',y(verifyEnd.v)+4).attr('font-weight','bold').attr('font-size',11).text('Human verifies');
  g.append('text').attr('x',x(verifyEnd.t)+8).attr('y',y(verifyEnd.v)+18).attr('font-size',10).attr('class','secondary').text('roughly stable');

  svg.append('text').attr('class','secondary').attr('x',margin.left).attr('y',totalHeight-16).attr('font-size',10)
    .text('Your job is not to solve faster. Your job is to verify better.');
}
draw();
const ro = new ResizeObserver(() => draw());
ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
