<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 4.1 — Conductor and orchestra</title>
<style>
:root {
  --color-white: #FFFFFF;
  --color-fill: #F5EFE8;
  --color-ink: #2a1a0e;
  --color-mark: #6B3520;
  --color-red: #C8102E;
  --color-slate: #1A3A5C;
  --color-ochre: #C8860E;
  --color-secondary: #545454;
  --color-border: #D4D4D4;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-white: #111111;
    --color-fill: #1a1612;
    --color-ink: #F0EBE3;
    --color-mark: #C8865E;
    --color-red: #E8243A;
    --color-slate: #6B8FB8;
    --color-ochre: #D49A30;
    --color-secondary: #A0978C;
    --color-border: #2E2E2E;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--color-white); color: var(--color-ink); font-family: 'EB Garamond', Georgia, serif; padding: 24px; }
#chart { width: 100%; min-height: 520px; position: relative; }
.tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-slate); color: var(--color-white); padding: 6px 10px; font-size: 12px; font-family: 'EB Garamond', Georgia, serif; max-width: 280px; }
text { font-family: 'EB Garamond', Georgia, serif; fill: var(--color-ink); }
.caps { font-family: 'IBM Plex Mono', 'JetBrains Mono', monospace; letter-spacing: 0.08em; font-size: 10px; fill: var(--color-secondary); }
.secondary { fill: var(--color-secondary); }
.box { fill: var(--color-white); stroke: var(--color-border); stroke-width: 1; cursor: pointer; transition: fill 120ms; }
.box.interface { fill: var(--color-fill); }
.box:hover { fill: var(--color-fill); }
.box.interface:hover { fill: var(--color-white); }
.arrow { stroke: var(--color-ink); stroke-width: 1.5; fill: none; }
.divider { stroke: var(--color-border); stroke-width: 0.75; }
.divider-dash { stroke: var(--color-border); stroke-width: 0.75; stroke-dasharray: 4 3; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div id="chart" role="main"></div>
<div class="tooltip" id="tt"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
function draw() {
  d3.select('#chart').selectAll('*').remove();
  const totalWidth = document.getElementById('chart').clientWidth || 700;
  const totalHeight = 520;

  const svg = d3.select('#chart').append('svg')
    .attr('width', totalWidth).attr('height', totalHeight)
    .attr('role', 'img').attr('aria-labelledby', 'chart-title chart-desc');
  svg.append('title').attr('id', 'chart-title').text('The conductor and the orchestra');
  svg.append('desc').attr('id', 'chart-desc').text('Human (conductor) on the left holds intent, sequences, verifies. Claude (orchestra) on the right executes the contract. Between them sit the specification and the handoff condition.');

  const defs = svg.append('defs');
  defs.append('marker').attr('id','arrow-ink').attr('markerWidth',8).attr('markerHeight',6).attr('refX',7).attr('refY',3).attr('orient','auto')
    .append('polygon').attr('points','0 0, 8 3, 0 6').attr('fill','var(--color-ink)');

  svg.append('text').attr('class','caps').attr('x',32).attr('y',32).text('FIGURE 4.1 — CONDUCTOR / ORCHESTRA');
  svg.append('text').attr('x',32).attr('y',60).attr('font-weight','bold').attr('font-size',13).text('Who holds the piece. Who plays the parts.');

  // Layout coordinates scaled to viewport (we'll keep widths fixed and center)
  const baseY = 120;
  const boxH = 240;
  const boxW = 200;
  const midW = 196;
  const totalUsed = boxW + 24 + midW + 24 + boxW;
  const startX = Math.max(32, (totalWidth - totalUsed)/2);
  const humanX = startX;
  const midX = humanX + boxW + 24;
  const claudeX = midX + midW + 24;

  const tt = d3.select('#tt');
  function showTip(html){ tt.html(html).style('opacity',1); }
  function moveTip(e){ tt.style('left',(e.pageX+12)+'px').style('top',(e.pageY-8)+'px'); }
  function hideTip(){ tt.style('opacity',0); }

  // Human box
  const human = svg.append('g');
  human.append('rect').attr('class','box').attr('x',humanX).attr('y',baseY).attr('width',boxW).attr('height',boxH)
    .on('mouseenter',()=>showTip('Conductor: the only person in the room not making noise — and the most important. Holds the piece across the whole build.'))
    .on('mousemove',moveTip).on('mouseleave',hideTip);
  human.append('text').attr('class','caps').attr('x',humanX+boxW/2).attr('y',baseY+24).attr('text-anchor','middle').text('HUMAN');
  human.append('text').attr('x',humanX+boxW/2).attr('y',baseY+52).attr('text-anchor','middle').attr('font-weight','bold').attr('font-size',13).text('Conductor');
  human.append('line').attr('class','divider').attr('x1',humanX+16).attr('x2',humanX+boxW-16).attr('y1',baseY+68).attr('y2',baseY+68);
  ['— holds intent','— sequences the work','— writes the specification','— names the boundary','— verifies against the world','— decides if it ships']
    .forEach((t,i)=> human.append('text').attr('x',humanX+16).attr('y',baseY+92+i*22).attr('font-size',11).text(t));

  // Interface (middle) box
  const mid = svg.append('g');
  mid.append('rect').attr('class','box interface').attr('x',midX).attr('y',baseY+40).attr('width',midW).attr('height',boxH-80)
    .on('mouseenter',()=>showTip('The interface: structured, falsifiable, executable. Where intent gets written down and verified.'))
    .on('mousemove',moveTip).on('mouseleave',hideTip);
  mid.append('text').attr('class','caps').attr('x',midX+midW/2).attr('y',baseY+62).attr('text-anchor','middle').text('THE INTERFACE');
  mid.append('text').attr('x',midX+midW/2).attr('y',baseY+88).attr('text-anchor','middle').attr('font-weight','bold').attr('font-size',13).text('Specification');
  mid.append('text').attr('x',midX+midW/2).attr('y',baseY+104).attr('text-anchor','middle').attr('font-size',10).attr('class','secondary').text('invariants, scope, contract');
  mid.append('line').attr('class','divider-dash').attr('x1',midX+28).attr('x2',midX+midW-28).attr('y1',baseY+118).attr('y2',baseY+118);
  mid.append('text').attr('x',midX+midW/2).attr('y',baseY+142).attr('text-anchor','middle').attr('font-weight','bold').attr('font-size',13).text('Handoff condition');
  mid.append('text').attr('x',midX+midW/2).attr('y',baseY+158).attr('text-anchor','middle').attr('font-size',10).attr('class','secondary').text('verb, target, success criterion');

  // Claude box
  const claude = svg.append('g');
  claude.append('rect').attr('class','box').attr('x',claudeX).attr('y',baseY).attr('width',boxW).attr('height',boxH)
    .on('mouseenter',()=>showTip('Orchestra: excellent at the instruments, faster than you at the parts, blind to the piece.'))
    .on('mousemove',moveTip).on('mouseleave',hideTip);
  claude.append('text').attr('class','caps').attr('x',claudeX+boxW/2).attr('y',baseY+24).attr('text-anchor','middle').text('CLAUDE');
  claude.append('text').attr('x',claudeX+boxW/2).attr('y',baseY+52).attr('text-anchor','middle').attr('font-weight','bold').attr('font-size',13).text('Orchestra');
  claude.append('line').attr('class','divider').attr('x1',claudeX+16).attr('x2',claudeX+boxW-16).attr('y1',baseY+68).attr('y2',baseY+68);
  ['— executes the contract','— writes the implementation','— edits the named files','— runs tests and tools','— reports the result','— holds no piece across sessions']
    .forEach((t,i)=> claude.append('text').attr('x',claudeX+16).attr('y',baseY+92+i*22).attr('font-size',11).text(t));

  // Arrows
  const yTop = baseY+104;
  const yBot = baseY+154;
  // Human → mid (writes)
  svg.append('line').attr('class','arrow').attr('x1',humanX+boxW).attr('y1',yTop).attr('x2',midX-4).attr('y2',yTop).attr('marker-end','url(#arrow-ink)');
  svg.append('text').attr('x',(humanX+boxW+midX)/2).attr('y',yTop-8).attr('text-anchor','middle').attr('font-style','italic').attr('font-size',10).attr('class','secondary').text('writes');
  // Mid → claude (executes)
  svg.append('line').attr('class','arrow').attr('x1',midX+midW).attr('y1',yTop).attr('x2',claudeX-4).attr('y2',yTop).attr('marker-end','url(#arrow-ink)');
  svg.append('text').attr('x',(midX+midW+claudeX)/2).attr('y',yTop-8).attr('text-anchor','middle').attr('font-style','italic').attr('font-size',10).attr('class','secondary').text('executes');
  // Claude → mid (returns)
  svg.append('line').attr('class','arrow').attr('x1',claudeX).attr('y1',yBot).attr('x2',midX+midW+4).attr('y2',yBot).attr('marker-end','url(#arrow-ink)');
  svg.append('text').attr('x',(midX+midW+claudeX)/2).attr('y',yBot+18).attr('text-anchor','middle').attr('font-style','italic').attr('font-size',10).attr('class','secondary').text('returns');
  // Mid → human (verifies)
  svg.append('line').attr('class','arrow').attr('x1',midX).attr('y1',yBot).attr('x2',humanX+boxW+4).attr('y2',yBot).attr('marker-end','url(#arrow-ink)');
  svg.append('text').attr('x',(humanX+boxW+midX)/2).attr('y',yBot+18).attr('text-anchor','middle').attr('font-style','italic').attr('font-size',10).attr('class','secondary').text('verifies');

  svg.append('text').attr('class','secondary').attr('x',32).attr('y',totalHeight-24).attr('font-size',10)
    .text('A prompt is a wish. A specification is a contract. The handoff condition is how you know the contract was kept.');
}
draw();
const ro = new ResizeObserver(() => draw());
ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
