<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Seth's arc: observer to practitioner</title>
  <desc id="desc">A two-point editorial timeline showing the movement from watching friends use AI to building a disciplined practice of one's own.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <!-- Section label -->
  <text x="32" y="56" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" letter-spacing="0.08em" fill="#545454">FIGURE 0.1 — THE ARC</text>

  <!-- Title -->
  <text x="32" y="88" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">From observer to practitioner</text>

  <!-- Horizontal baseline -->
  <line x1="120" y1="240" x2="580" y2="240" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left endpoint -->
  <circle cx="160" cy="240" r="6" fill="#2a1a0e"/>
  <text x="160" y="216" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" letter-spacing="0.08em" fill="#545454">BEFORE</text>
  <text x="160" y="280" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">Watches friends</text>
  <text x="160" y="304" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#2a1a0e">paste prompts, copy answers,</text>
  <text x="160" y="320" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#2a1a0e">ship homework, fail the quiz.</text>

  <!-- Midpoint marker (the quiet shift) -->
  <line x1="370" y1="232" x2="370" y2="248" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>
  <text x="370" y="216" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" letter-spacing="0.08em" fill="#545454">THE TURN</text>
  <text x="370" y="184" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#545454" font-style="italic">notice the gap between</text>
  <text x="370" y="200" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#545454" font-style="italic">output and learning</text>

  <!-- Right endpoint -->
  <circle cx="555" cy="240" r="6" fill="#2a1a0e"/>
  <text x="555" y="216" text-anchor="middle" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" letter-spacing="0.08em" fill="#545454">AFTER</text>
  <text x="555" y="280" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">Builds the discipline</text>
  <text x="555" y="304" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#2a1a0e">conducts the tool, defends</text>
  <text x="555" y="320" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#2a1a0e">every line, keeps the skill.</text>

  <!-- Footer caption -->
  <text x="32" y="392" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454">The arc is not about more typing. It is about deciding which work stays yours.</text>
</svg>
